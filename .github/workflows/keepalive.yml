name: Supabase Keep Alive - Academia

on:
  schedule:
    - cron: '0 0 * * 3,6'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Proyecto Academia
        run: |
          echo "=== DEBUG ==="
          echo "URL: ${{ secrets.SUPABASE_URL }}"
          echo "Key length: ${#SUPABASE_ANON_KEY} chars"
          
          curl -v -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --silent --show-error || echo "❌ Error código $?"
